<!doctype html>
<html lang="id" class="h-full">
 <head><script src="/_sdk/telemetry_sdk.js"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Photobooth Wisuda SDIT ICMA</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <script src="/_sdk/element_sdk.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&amp;family=Outfit:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet">
  <style>
    html, body { height: 100%; margin: 0; }
    body { font-family: 'Outfit', sans-serif; }
    .font-display { font-family: 'Playfair Display', serif; }
    
    .glass-card {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(212, 175, 55, 0.2);
    }
    
    .glow-gold {
      box-shadow: 0 0 30px rgba(212, 175, 55, 0.3), 0 0 60px rgba(212, 175, 55, 0.1);
    }
    
    .glow-blue {
      box-shadow: 0 0 20px rgba(30, 58, 138, 0.5);
    }
    
    .btn-primary {
      background: linear-gradient(135deg, #d4af37, #f4d03f, #d4af37);
      color: #1e3a5f;
      font-weight: 600;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(212, 175, 55, 0.4);
    }
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 25px rgba(212, 175, 55, 0.6);
    }
    
    .btn-secondary {
      background: rgba(30, 58, 138, 0.8);
      border: 1px solid rgba(212, 175, 55, 0.4);
      color: #f4d03f;
      transition: all 0.3s ease;
    }
    .btn-secondary:hover {
      background: rgba(30, 58, 138, 1);
      border-color: #d4af37;
    }
    
    .countdown-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.6);
      z-index: 50;
    }
    .countdown-num {
      font-size: 8rem;
      font-weight: 900;
      color: #d4af37;
      text-shadow: 0 0 40px rgba(212,175,55,0.8);
      animation: countPulse 1s ease-in-out;
    }
    @keyframes countPulse {
      0% { transform: scale(2); opacity: 0; }
      50% { transform: scale(1); opacity: 1; }
      100% { transform: scale(0.8); opacity: 0.5; }
    }
    
    .flash-overlay {
      position: fixed;
      inset: 0;
      background: white;
      z-index: 9999;
      animation: flash 0.5s ease-out forwards;
    }
    @keyframes flash {
      0% { opacity: 1; }
      100% { opacity: 0; pointer-events: none; }
    }
    
    .loading-overlay {
      position: fixed;
      inset: 0;
      background: rgba(10, 20, 50, 0.9);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9998;
    }
    .spinner {
      width: 60px; height: 60px;
      border: 4px solid rgba(212,175,55,0.2);
      border-top-color: #d4af37;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    
    .editor-canvas-wrapper {
      position: relative;
      width: 100%;
      max-width: 400px;
      aspect-ratio: 4/5;
      overflow: hidden;
      border-radius: 12px;
      background: #0a1628;
    }
    
    .photo-layer {
      position: absolute;
      inset: 0;
      cursor: grab;
      touch-action: none;
    }
    .photo-layer:active { cursor: grabbing; }
    
    .frame-layer {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 10;
    }
    .frame-layer img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }
    
    .bg-gradient-main {
      background: linear-gradient(135deg, #0a1628 0%, #1e3a5f 40%, #0d1f3c 70%, #0a1628 100%);
    }
    
    .star-decoration {
      position: absolute;
      width: 4px; height: 4px;
      background: #d4af37;
      border-radius: 50%;
      opacity: 0.4;
      animation: twinkle 3s infinite alternate;
    }
    @keyframes twinkle {
      0% { opacity: 0.2; transform: scale(0.8); }
      100% { opacity: 0.8; transform: scale(1.2); }
    }
  </style>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            navy: { 900: '#0a1628', 800: '#0d1f3c', 700: '#1e3a5f' },
            royal: { 500: '#2563eb', 600: '#1d4ed8', 700: '#1e3a8a' },
            gold: { 400: '#f4d03f', 500: '#d4af37', 600: '#b8941f' }
          }
        }
      }
    }
  </script>

 <body class="h-full bg-gradient-main text-white overflow-auto">
  <div id="app" class="w-full min-h-full flex flex-col"><!-- Header -->
   <header class="text-center py-6 px-4 relative">
    <div class="star-decoration" style="top:10%;left:15%"></div>
    <div class="star-decoration" style="top:20%;right:20%;animation-delay:1s"></div>
    <div class="star-decoration" style="top:50%;left:8%;animation-delay:2s"></div>
    <div class="flex items-center justify-center gap-3 mb-2">
     <div class="w-12 h-12 rounded-full bg-gradient-to-br from-gold-400 to-gold-600 flex items-center justify-center text-navy-900 font-bold text-sm shadow-lg">
      ICMA
     </div>
    </div>
    <h1 id="mainTitle" class="font-display text-2xl md:text-3xl font-bold text-gold-400 drop-shadow-lg">Photobooth Wisuda Angkatan III</h1>
    <p id="subtitleText" class="text-gold-500 tracking-[0.3em] text-sm mt-1 font-medium">SMART GENERATION</p>
   </header><!-- Main Content -->
   <main class="flex-1 flex flex-col items-center px-4 pb-6 gap-5"><!-- Camera/Upload Section -->
    <div id="inputSection" class="w-full max-w-md">
     <div class="glass-card rounded-2xl p-4 glow-gold"><!-- Camera Preview -->
      <div id="cameraContainer" class="relative editor-canvas-wrapper mx-auto" style="display:none;">
       <video id="cameraVideo" autoplay playsinline class="w-full h-full object-cover"></video>
       <div id="countdownOverlay" class="countdown-overlay" style="display:none;"><span id="countdownNum" class="countdown-num">3</span>
       </div>
      </div><!-- Placeholder -->
      <div id="placeholder" class="editor-canvas-wrapper mx-auto flex flex-col items-center justify-center border-2 border-dashed border-gold-500/40"><i data-lucide="camera" class="w-16 h-16 text-gold-500/50 mb-3"></i>
       <p class="text-white/60 text-sm">Ambil foto atau upload dari galeri</p>
      </div><!-- Controls -->
      <div class="flex flex-wrap justify-center gap-2 mt-4"><button id="btnOpenCamera" onclick="openCamera()" class="btn-primary px-4 py-2 rounded-full text-sm flex items-center gap-2"> <i data-lucide="camera" class="w-4 h-4"></i> Buka Kamera </button> <button id="btnSwitchCam" onclick="switchCamera()" class="btn-secondary px-3 py-2 rounded-full text-sm flex items-center gap-1" style="display:none;"> <i data-lucide="refresh-cw" class="w-4 h-4"></i> Ganti </button> <button id="btnCapture" onclick="startCountdown()" class="btn-primary px-4 py-2 rounded-full text-sm flex items-center gap-2" style="display:none;"> <i data-lucide="aperture" class="w-4 h-4"></i> Ambil Foto </button> <label class="btn-secondary px-4 py-2 rounded-full text-sm flex items-center gap-2 cursor-pointer"> <i data-lucide="upload" class="w-4 h-4"></i> Upload <input type="file" accept="image/*" onchange="handleUpload(event)" class="hidden"> </label>
      </div>
     </div>
    </div><!-- Editor Section -->
    <div id="editorSection" class="w-full max-w-md" style="display:none;">
     <div class="glass-card rounded-2xl p-4 glow-gold">
      <div class="editor-canvas-wrapper mx-auto relative" id="editorWrapper">
       <div class="photo-layer" id="photoLayer"><img id="photoImg" src="" alt="Foto" class="w-full h-full object-cover" style="transform-origin:center center;">
       </div>
       <div class="frame-layer"><img id="frameImg" src="" alt="Frame Twibbon">
       </div>
      </div><!-- Editor Controls -->
      <div class="flex flex-wrap justify-center gap-2 mt-4"><button onclick="zoomIn()" class="btn-secondary px-3 py-2 rounded-lg text-xs flex items-center gap-1"> <i data-lucide="zoom-in" class="w-4 h-4"></i> </button> <button onclick="zoomOut()" class="btn-secondary px-3 py-2 rounded-lg text-xs flex items-center gap-1"> <i data-lucide="zoom-out" class="w-4 h-4"></i> </button> <button onclick="rotateLeft()" class="btn-secondary px-3 py-2 rounded-lg text-xs flex items-center gap-1"> <i data-lucide="rotate-ccw" class="w-4 h-4"></i> </button> <button onclick="rotateRight()" class="btn-secondary px-3 py-2 rounded-lg text-xs flex items-center gap-1"> <i data-lucide="rotate-cw" class="w-4 h-4"></i> </button> <button onclick="resetPosition()" class="btn-secondary px-3 py-2 rounded-lg text-xs flex items-center gap-1"> <i data-lucide="maximize" class="w-4 h-4"></i> Reset </button>
      </div>
      <div class="flex flex-wrap justify-center gap-2 mt-3"><button onclick="retakePhoto()" class="btn-secondary px-4 py-2 rounded-full text-sm flex items-center gap-2"> <i data-lucide="camera" class="w-4 h-4"></i> Ulangi </button> <button onclick="renderAndDownload()" class="btn-primary px-5 py-2 rounded-full text-sm flex items-center gap-2"> <i data-lucide="download" class="w-4 h-4"></i> Download </button> <button onclick="shareWhatsApp()" class="btn-secondary px-4 py-2 rounded-full text-sm flex items-center gap-2" style="background:rgba(37,211,102,0.8);border-color:rgba(37,211,102,0.6);color:white;"> <i data-lucide="share" class="w-4 h-4"></i> Share </button>
      </div>
     </div>
    </div><!-- Preview Section -->
    <div id="previewSection" class="w-full max-w-md" style="display:none;">
     <div class="glass-card rounded-2xl p-4 glow-gold">
      <h3 class="text-center text-gold-400 font-semibold mb-3">Preview Hasil</h3><img id="previewImg" src="" alt="Preview" class="w-full rounded-lg">
     </div>
    </div>
   </main><!-- Footer -->
   <footer class="text-center py-4 px-4 border-t border-gold-500/20">
    <p class="text-gold-400 font-display font-bold text-lg">SDIT ICMA</p>
    <p id="footerTagline" class="text-white/50 text-xs tracking-wider mt-1">Islami • Cerdas • Memimpin • Mandiri</p>
   </footer>
  </div><!-- Flash Effect -->
  <div id="flashOverlay" class="flash-overlay" style="display:none;"></div><!-- Loading Overlay -->
  <div id="loadingOverlay" class="loading-overlay" style="display:none;">
   <div class="spinner mb-4"></div>
   <p class="text-gold-400 font-medium">Memproses foto...</p>
  </div>
  <script>
    // --- STATE ---
    let stream = null;
    let facingMode = 'user';
    let photoData = null;
    let transform = { x: 0, y: 0, scale: 1, rotation: 0 };
    let isDragging = false;
    let dragStart = { x: 0, y: 0 };
    
    // Frame URL - ganti dengan URL frame PNG transparan Anda
    const FRAME_URL = 'frame.png'; // Masukkan URL frame twibbon di sini
    const OUTPUT_WIDTH = 1080;
    const OUTPUT_HEIGHT = 1350;

    // --- CAMERA ---
    async function openCamera() {
      try {
        if (stream) stream.getTracks().forEach(t => t.stop());
        stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode, width: { ideal: 1080 }, height: { ideal: 1350 } },
          audio: false
        });
        const video = document.getElementById('cameraVideo');
        video.srcObject = stream;
        document.getElementById('cameraContainer').style.display = 'block';
        document.getElementById('placeholder').style.display = 'none';
        document.getElementById('btnCapture').style.display = 'flex';
        document.getElementById('btnSwitchCam').style.display = 'flex';
      } catch(e) {
        showToast('Gagal membuka kamera. Pastikan izin kamera diaktifkan.');
      }
    }

    function switchCamera() {
      facingMode = facingMode === 'user' ? 'environment' : 'user';
      openCamera();
    }

    function startCountdown() {
      const overlay = document.getElementById('countdownOverlay');
      const num = document.getElementById('countdownNum');
      overlay.style.display = 'flex';
      let count = 3;
      num.textContent = count;
      const interval = setInterval(() => {
        count--;
        if (count > 0) {
          num.textContent = count;
          num.style.animation = 'none';
          void num.offsetWidth;
          num.style.animation = 'countPulse 1s ease-in-out';
        } else {
          clearInterval(interval);
          overlay.style.display = 'none';
          capturePhoto();
        }
      }, 1000);
    }

    function capturePhoto() {
      // Flash
      const flash = document.getElementById('flashOverlay');
      flash.style.display = 'block';
      flash.style.animation = 'none';
      void flash.offsetWidth;
      flash.style.animation = 'flash 0.5s ease-out forwards';
      setTimeout(() => flash.style.display = 'none', 600);

      const video = document.getElementById('cameraVideo');
      const canvas = document.createElement('canvas');
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      const ctx = canvas.getContext('2d');
      if (facingMode === 'user') {
        ctx.translate(canvas.width, 0);
        ctx.scale(-1, 1);
      }
      ctx.drawImage(video, 0, 0);
      photoData = canvas.toDataURL('image/jpeg', 0.92);
      
      // Stop camera
      if (stream) stream.getTracks().forEach(t => t.stop());
      stream = null;
      
      showEditor();
    }

    // --- UPLOAD ---
    function handleUpload(e) {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (ev) => {
        photoData = ev.target.result;
        showEditor();
      };
      reader.readAsDataURL(file);
      e.target.value = '';
    }

    // --- EDITOR ---
    function showEditor() {
      document.getElementById('inputSection').style.display = 'none';
      document.getElementById('editorSection').style.display = 'block';
      document.getElementById('previewSection').style.display = 'none';
      
      const img = document.getElementById('photoImg');
      img.src = photoData;
      
      if (FRAME_URL) {
        document.getElementById('frameImg').src = FRAME_URL;
      }
      
      resetPosition();
      setupDrag();
      
      // Save to localStorage
      try { localStorage.setItem('icma_photo', photoData); } catch(e) {}
      
      lucide.createIcons();
    }

    function updateTransform() {
      const img = document.getElementById('photoImg');
      img.style.transform = `translate(${transform.x}px, ${transform.y}px) scale(${transform.scale}) rotate(${transform.rotation}deg)`;
    }

    function zoomIn() { transform.scale = Math.min(transform.scale + 0.1, 3); updateTransform(); }
    function zoomOut() { transform.scale = Math.max(transform.scale - 0.1, 0.3); updateTransform(); }
    function rotateLeft() { transform.rotation -= 90; updateTransform(); }
    function rotateRight() { transform.rotation += 90; updateTransform(); }
    function resetPosition() { transform = { x: 0, y: 0, scale: 1, rotation: 0 }; updateTransform(); }

    // --- DRAG ---
    function setupDrag() {
      const layer = document.getElementById('photoLayer');
      
      layer.onpointerdown = (e) => {
        isDragging = true;
        dragStart = { x: e.clientX - transform.x, y: e.clientY - transform.y };
        layer.setPointerCapture(e.pointerId);
      };
      layer.onpointermove = (e) => {
        if (!isDragging) return;
        transform.x = e.clientX - dragStart.x;
        transform.y = e.clientY - dragStart.y;
        updateTransform();
      };
      layer.onpointerup = () => { isDragging = false; };
    }

    async function loadImage(src) {
      try {
        const response = await fetch(src);
        if (!response.ok) throw new Error(`Gagal memuat gambar: ${src}`);
        const blob = await response.blob();
        const objectUrl = URL.createObjectURL(blob);

        return await new Promise((resolve, reject) => {
          const img = new Image();
          img.onload = () => {
            URL.revokeObjectURL(objectUrl);
            resolve(img);
          };
          img.onerror = () => {
            URL.revokeObjectURL(objectUrl);
            reject(new Error(`Gagal memuat gambar: ${src}`));
          };
          img.src = objectUrl;
        });
      } catch (error) {
        console.error(error);
        throw error;
      }
    }

    // --- RENDER IMAGE ---
    async function renderPhotoBlob() {
      if (!photoData) {
        throw new Error('Foto belum tersedia.');
      }

      const canvas = document.createElement('canvas');
      canvas.width = OUTPUT_WIDTH;
      canvas.height = OUTPUT_HEIGHT;
      const ctx = canvas.getContext('2d');

      if (!ctx) {
        throw new Error('Canvas tidak tersedia di browser ini.');
      }

      const photo = await loadImage(photoData);
      const wrapper = document.getElementById('editorWrapper');
      const scaleRatio = OUTPUT_WIDTH / Math.max(wrapper.clientWidth, 1);

      const targetRatio = OUTPUT_WIDTH / OUTPUT_HEIGHT;
      const sourceRatio = photo.naturalWidth / photo.naturalHeight;

      let sx = 0;
      let sy = 0;
      let sw = photo.naturalWidth;
      let sh = photo.naturalHeight;

      if (sourceRatio > targetRatio) {
        sw = photo.naturalHeight * targetRatio;
        sx = (photo.naturalWidth - sw) / 2;
      } else {
        sh = photo.naturalWidth / targetRatio;
        sy = (photo.naturalHeight - sh) / 2;
      }

      ctx.save();
      ctx.translate(OUTPUT_WIDTH / 2 + transform.x * scaleRatio, OUTPUT_HEIGHT / 2 + transform.y * scaleRatio);
      ctx.scale(transform.scale, transform.scale);
      ctx.rotate(transform.rotation * Math.PI / 180);
      ctx.drawImage(photo, sx, sy, sw, sh, -OUTPUT_WIDTH / 2, -OUTPUT_HEIGHT / 2, OUTPUT_WIDTH, OUTPUT_HEIGHT);
      ctx.restore();

      if (FRAME_URL) {
        const frame = await loadImage(FRAME_URL);
        ctx.drawImage(frame, 0, 0, OUTPUT_WIDTH, OUTPUT_HEIGHT);
      }

      return await new Promise((resolve, reject) => {
        canvas.toBlob((result) => result ? resolve(result) : reject(new Error('Gagal membuat file gambar.')), 'image/png');
      });
    }

    // --- RENDER & DOWNLOAD ---
    async function renderAndDownload() {
      document.getElementById('loadingOverlay').style.display = 'flex';

      try {
        const blob = await renderPhotoBlob();
        const dataUrl = URL.createObjectURL(blob);
        const preview = document.getElementById('previewImg');
        preview.src = dataUrl;
        document.getElementById('previewSection').style.display = 'block';

        const link = document.createElement('a');
        link.href = dataUrl;
        link.download = 'Wisuda_SDIT_ICMA.png';
        document.body.appendChild(link);
        link.click();
        link.remove();
        setTimeout(() => URL.revokeObjectURL(dataUrl), 1000);

        showToast('Foto berhasil didownload! 🎓');
      } catch (error) {
        console.error(error);
        showToast('Download gagal. Coba lagi atau gunakan browser lain.');
      } finally {
        document.getElementById('loadingOverlay').style.display = 'none';
      }
    }

    // --- RETAKE ---
    function retakePhoto() {
      document.getElementById('editorSection').style.display = 'none';
      document.getElementById('previewSection').style.display = 'none';
      document.getElementById('inputSection').style.display = 'block';
      document.getElementById('cameraContainer').style.display = 'none';
      document.getElementById('placeholder').style.display = 'flex';
      document.getElementById('btnCapture').style.display = 'none';
      document.getElementById('btnSwitchCam').style.display = 'none';
      photoData = null;
    }

    // --- SHARE ---
    async function shareWhatsApp() {
      if (!photoData) {
        showToast('Foto belum tersedia, silakan ambil atau upload dulu.');
        return;
      }

      document.getElementById('loadingOverlay').style.display = 'flex';

      try {
        const blob = await renderPhotoBlob();
        const file = new File([blob], 'Wisuda_SDIT_ICMA.png', { type: 'image/png' });
        const shareText = '🎓 Hasil photobooth saya dari SDIT ICMA!\n\nCoba juga di: ' + window.location.href;

        if (navigator.share && navigator.canShare && navigator.canShare({ files: [file] })) {
          await navigator.share({
            title: 'Photobooth Wisuda SDIT ICMA',
            text: shareText,
            files: [file]
          });
          showToast('Berhasil membuka opsi berbagi WhatsApp.');
          return;
        }

        const whatsappUrl = 'https://wa.me/?text=' + encodeURIComponent(shareText);
        window.open(whatsappUrl, '_blank', 'noopener,noreferrer');
        showToast('WhatsApp dibuka. Silakan bagikan foto hasil photobooth dari opsi yang tersedia.');
      } catch (error) {
        if (error && error.name === 'AbortError') return;
        console.error(error);
        const fallbackText = '🎓 Hasil photobooth saya dari SDIT ICMA!\n\nCoba juga di: ' + window.location.href;
        window.open('https://wa.me/?text=' + encodeURIComponent(fallbackText), '_blank', 'noopener,noreferrer');
        showToast('WhatsApp dibuka dengan link hasil photobooth.');
      } finally {
        document.getElementById('loadingOverlay').style.display = 'none';
      }
    }

    // --- TOAST ---
    function showToast(msg) {
      const toast = document.createElement('div');
      toast.className = 'fixed bottom-6 left-1/2 -translate-x-1/2 bg-gold-500 text-navy-900 px-5 py-3 rounded-full font-semibold text-sm shadow-lg z-[9999] transition-opacity duration-500';
      toast.textContent = msg;
      document.body.appendChild(toast);
      setTimeout(() => { toast.style.opacity = '0'; setTimeout(() => toast.remove(), 500); }, 3000);
    }

    // --- LOAD SAVED ---
    function loadSaved() {
      try {
        const saved = localStorage.getItem('icma_photo');
        if (saved) {
          photoData = saved;
          showEditor();
        }
      } catch(e) {}
    }

    // --- ELEMENT SDK ---
    const defaultConfig = {
      main_title: 'Photobooth Wisuda Angkatan III',
      subtitle: 'SMART GENERATION',
      footer_text: 'Islami • Cerdas • Memimpin • Mandiri',
      background_color: '#0a1628',
      surface_color: '#1e3a5f',
      text_color: '#ffffff',
      primary_action_color: '#d4af37',
      secondary_action_color: '#f4d03f',
      font_family: 'Playfair Display',
      font_size: 16
    };

    async function onConfigChange(config) {
      document.getElementById('mainTitle').textContent = config.main_title || defaultConfig.main_title;
      document.getElementById('subtitleText').textContent = config.subtitle || defaultConfig.subtitle;
      document.getElementById('footerTagline').textContent = config.footer_text || defaultConfig.footer_text;
      
      const bg = config.background_color || defaultConfig.background_color;
      const surface = config.surface_color || defaultConfig.surface_color;
      const textCol = config.text_color || defaultConfig.text_color;
      const primary = config.primary_action_color || defaultConfig.primary_action_color;
      const secondary = config.secondary_action_color || defaultConfig.secondary_action_color;
      
      document.documentElement.style.setProperty('--bg', bg);
      document.getElementById('app').style.background = `linear-gradient(135deg, ${bg} 0%, ${surface} 40%, ${bg} 100%)`;
      
      document.querySelectorAll('.btn-primary').forEach(btn => {
        btn.style.background = `linear-gradient(135deg, ${primary}, ${secondary}, ${primary})`;
      });
      
      const font = config.font_family || defaultConfig.font_family;
      const baseSize = config.font_size || defaultConfig.font_size;
      document.getElementById('mainTitle').style.fontFamily = `${font}, serif`;
      document.getElementById('mainTitle').style.fontSize = `${baseSize * 1.8}px`;
      document.getElementById('subtitleText').style.fontSize = `${baseSize * 0.85}px`;
    }
